# 云端定时推送：无需 Mac 开机/登录
# 北京时间 每天 08:00 = UTC 00:00（含周末）；多次尝试 + 防重复，一天只推一条
name: AI Daily Brief

on:
  schedule:
    - cron: "0 0 * * *"    # 08:00 北京时间
    - cron: "15 0 * * *"   # 08:15 备用
    - cron: "30 0 * * *"   # 08:30 备用
    - cron: "0 1 * * *"    # 09:00 备用
  workflow_dispatch:
  repository_dispatch:
    types: [daily-brief]

permissions:
  contents: read

concurrency:
  group: daily-brief-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      GITHUB_ACTIONS: "true"
      LLM_PROVIDER: deepseek
      OPENAI_MODEL: deepseek-chat
      OPENAI_BASE_URL: https://api.deepseek.com
      FEISHU_PUSH_MODE: webhook
      MAX_TOTAL_ITEMS: "60"

    steps:
      - name: Beijing date
        id: bjdate
        run: echo "day=$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Skip if already pushed today
        uses: actions/cache@v4
        id: sent-cache
        with:
          path: .cache/sent-${{ steps.bjdate.outputs.day }}
          key: brief-sent-${{ steps.bjdate.outputs.day }}

      - name: Already sent today
        if: steps.sent-cache.outputs.cache-hit == 'true'
        run: echo "Brief already sent today (${{ steps.bjdate.outputs.day }}), skipping."

      - name: Checkout
        if: steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.sent-cache.outputs.cache-hit != 'true'
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Preflight (normalize secrets)
        if: steps.sent-cache.outputs.cache-hit != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          set -e
          trim() { echo -n "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/^"//;s/"$//;s/^'\''//;s/'\''$//'; }
          KEY="$(trim "$OPENAI_API_KEY")"
          WH="$(trim "$FEISHU_WEBHOOK_URL")"
          WH="${WH#FEISHU_WEBHOOK_URL=}"
          WH="$(trim "$WH")"
          echo "OPENAI_API_KEY set: $(test -n "$KEY" && echo yes || echo NO)"
          echo "FEISHU_WEBHOOK_URL set: $(test -n "$WH" && echo yes || echo NO)"
          test -n "$WH" || (echo "::error::Missing FEISHU_WEBHOOK_URL secret" && exit 1)
          case "$WH" in
            https://open.feishu.cn/*|https://open.larksuite.com/*) ;;
            *) echo "::error::FEISHU_WEBHOOK_URL must be a Feishu bot https URL" && exit 1 ;;
          esac
          echo "::add-mask::$WH"
          echo "OPENAI_API_KEY=$KEY" >> "$GITHUB_ENV"
          echo "FEISHU_WEBHOOK_URL=$WH" >> "$GITHUB_ENV"
          test -n "$KEY" || echo "::warning::OPENAI_API_KEY empty — will use RSS dry-run fallback"

      - name: Run daily brief and push to Feishu
        if: steps.sent-cache.outputs.cache-hit != 'true'
        run: |
          python -u -m ai_news_bot.main --log-file logs/brief.log || EC=$?
          echo ""
          echo "========== logs/brief.log =========="
          cat logs/brief.log 2>/dev/null || echo "(no brief.log)"
          echo "========== crawler/errors summary =========="
          grep -E '\[main\]|\[feishu\]|\[crawler\]|FATAL|EXIT|Error|error' logs/brief.log 2>/dev/null || true
          echo "========== end (exit=${EC:-0}) =========="
          exit ${EC:-0}

      - name: Mark sent today
        if: success() && steps.sent-cache.outputs.cache-hit != 'true'
        run: mkdir -p ".cache/sent-${{ steps.bjdate.outputs.day }}" && touch ".cache/sent-${{ steps.bjdate.outputs.day }}/ok"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: brief-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
