# 云端定时推送：无需 Mac 开机/登录
# 北京时间 工作日 08:00 = UTC 00:00（Mon–Fri）
name: AI Daily Brief

on:
  # 推送到 main 时也会跑一次（便于首次在 Actions 页看到记录）
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Preflight (secrets & env)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          echo "OPENAI_API_KEY set: $(test -n \"$OPENAI_API_KEY\" && echo yes || echo NO)"
          echo "FEISHU_WEBHOOK_URL set: $(test -n \"$FEISHU_WEBHOOK_URL\" && echo yes || echo NO)"
          test -n "$FEISHU_WEBHOOK_URL" || (echo "::error::Missing secret FEISHU_WEBHOOK_URL" && exit 1)
          test -n "$OPENAI_API_KEY" || echo "::warning::OPENAI_API_KEY empty — will use dry-run fallback"

      - name: Run daily brief and push to Feishu
        env:
          TZ: Asia/Shanghai
          PYTHONIOENCODING: utf-8
          GITHUB_ACTIONS: "true"
          LLM_PROVIDER: deepseek
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: deepseek-chat
          OPENAI_BASE_URL: https://api.deepseek.com
          FEISHU_PUSH_MODE: webhook
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          MAX_TOTAL_ITEMS: "60"
        run: |
          python -m ai_news_bot.main --log-file logs/brief.log || EC=$?
          echo "========== logs/brief.log =========="
          cat logs/brief.log 2>/dev/null || echo "(no brief.log)"
          echo "========== end =========="
          exit ${EC:-0}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: brief-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
