# 云端执行简报并推飞书
# 准时触发请用 cron-job.org → workflow_dispatch（见 docs/CLOUD_SCHEDULE.md）
# 下方 schedule 仅作兜底，GitHub 可能延迟数小时，不能指望 8:00 准时
name: AI Daily Brief

on:
  workflow_dispatch:
    inputs:
      force:
        description: "今天已发过也强制再发一次（修密钥后验证用）"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [daily-brief]
  schedule:
    - cron: "0 8 * * *"
      timezone: Asia/Shanghai
    - cron: "0 9 * * *"
      timezone: Asia/Shanghai

permissions:
  contents: read

concurrency:
  group: daily-brief-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      GITHUB_ACTIONS: "true"
      LLM_PROVIDER: deepseek
      OPENAI_MODEL: deepseek-chat
      OPENAI_BASE_URL: https://api.deepseek.com
      FEISHU_PUSH_MODE: webhook
      MAX_TOTAL_ITEMS: "60"

    steps:
      - name: Log trigger time (Beijing)
        run: |
          echo "Triggered at: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Event: ${{ github.event_name }} schedule=${{ github.event.schedule }}"

      - name: Beijing date
        id: bjdate
        run: echo "day=$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Skip if already pushed today
        uses: actions/cache@v4
        id: sent-cache
        with:
          path: .cache/sent-${{ steps.bjdate.outputs.day }}
          key: brief-sent-${{ steps.bjdate.outputs.day }}

      - name: Already sent today
        if: steps.sent-cache.outputs.cache-hit == 'true' && inputs.force != true
        run: echo "Brief already sent today (${{ steps.bjdate.outputs.day }}), skipping."

      - name: Checkout
        if: steps.sent-cache.outputs.cache-hit != 'true' || inputs.force == true
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.sent-cache.outputs.cache-hit != 'true' || inputs.force == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.sent-cache.outputs.cache-hit != 'true' || inputs.force == true
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Preflight (normalize secrets)
        if: steps.sent-cache.outputs.cache-hit != 'true' || inputs.force == true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          set -e
          trim() { echo -n "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/^"//;s/"$//;s/^'\''//;s/'\''$//'; }
          KEY="$(trim "$OPENAI_API_KEY")"
          if [ -z "$KEY" ]; then
            KEY="$(trim "$DEEPSEEK_API_KEY")"
          fi
          WH="$(trim "$FEISHU_WEBHOOK_URL")"
          WH="${WH#FEISHU_WEBHOOK_URL=}"
          WH="$(trim "$WH")"
          echo "OPENAI_API_KEY set: $(test -n "$KEY" && echo yes || echo NO)"
          echo "FEISHU_WEBHOOK_URL set: $(test -n "$WH" && echo yes || echo NO)"
          test -n "$KEY" || (echo "::error::Missing OPENAI_API_KEY (or DEEPSEEK_API_KEY) — 未配置会导致飞书只收到「试运行」模板内容。请到 Settings → Secrets 添加与本机 .env 相同的 DeepSeek sk- key" && exit 1)
          test -n "$WH" || (echo "::error::Missing FEISHU_WEBHOOK_URL secret" && exit 1)
          case "$WH" in
            https://open.feishu.cn/*|https://open.larksuite.com/*) ;;
            *) echo "::error::FEISHU_WEBHOOK_URL must be a Feishu bot https URL" && exit 1 ;;
          esac
          echo "::add-mask::$KEY"
          echo "::add-mask::$WH"
          echo "OPENAI_API_KEY=$KEY" >> "$GITHUB_ENV"
          echo "FEISHU_WEBHOOK_URL=$WH" >> "$GITHUB_ENV"

      - name: Verify LLM API (DeepSeek)
        if: steps.sent-cache.outputs.cache-hit != 'true' || inputs.force == true
        run: |
          set -e
          python3 - <<'PY'
          import json, os, urllib.error, urllib.request
          key = os.environ["OPENAI_API_KEY"]
          base = os.environ.get("OPENAI_BASE_URL", "https://api.deepseek.com").rstrip("/")
          model = os.environ.get("OPENAI_MODEL", "deepseek-chat")
          url = f"{base}/chat/completions" if base.endswith("/v1") else f"{base}/v1/chat/completions"
          body = json.dumps({
              "model": model,
              "messages": [{"role": "user", "content": "reply ok"}],
              "max_tokens": 5,
          }).encode()
          req = urllib.request.Request(
              url,
              data=body,
              headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read().decode())
              print(f"LLM ping OK: model={data.get('model', model)}")
          except urllib.error.HTTPError as e:
              err = e.read().decode(errors="replace")[:500]
              raise SystemExit(f"::error::LLM API failed HTTP {e.code}: {err}")
          PY

      - name: Run daily brief and push to Feishu
        if: steps.sent-cache.outputs.cache-hit != 'true' || inputs.force == true
        run: |
          python -u -m ai_news_bot.main --log-file logs/brief.log || EC=$?
          echo ""
          echo "========== logs/brief.log =========="
          cat logs/brief.log 2>/dev/null || echo "(no brief.log)"
          echo "========== crawler/errors summary =========="
          grep -E '\[main\]|\[feishu\]|\[crawler\]|FATAL|EXIT|Error|error' logs/brief.log 2>/dev/null || true
          echo "========== end (exit=${EC:-0}) =========="
          exit ${EC:-0}

      - name: Mark sent today
        if: success() && (steps.sent-cache.outputs.cache-hit != 'true' || inputs.force == true)
        run: mkdir -p ".cache/sent-${{ steps.bjdate.outputs.day }}" && touch ".cache/sent-${{ steps.bjdate.outputs.day }}/ok"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: brief-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
